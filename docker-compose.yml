version: '3'

services:
  backend:
    restart: always
    build: .
    ports:
      - "8008:8008"
    volumes:
      - .:/code
    environment:
      DEBUG: 'true'
    env_file:
      - .env
    command: uvicorn app.main:app --reload --workers 1 --host 0.0.0.0 --port 8008
    depends_on:
      - redis

  redis:
    image: redis:7.2.4-alpine
    ports:
      - "6380:6379"
    env_file:
      - .env
